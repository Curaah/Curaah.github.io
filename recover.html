<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#060d1f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png"/>
  <title>Curaah Recover — AI Recovery Intelligence</title>
  <meta name="description" content="Curaah Recover — AI-powered Personalized Recovery Intelligence Platform. Medication adherence, recovery tracking, health companion."/>
  <link rel="icon" href="assets/logo.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/recover.css"/>
</head>
<body>

<!-- ═══════════ APP SHELL ═══════════ -->
<div id="app" class="app-shell">

  <!-- ── TOP HEADER ── -->
  <header class="top-bar" id="topBar">
    <div class="top-bar-left">
      <svg class="top-logo" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="#3d9eff" stroke-width="2" opacity=".6"/><path d="M18 10v16M10 18h16" stroke="#3d9eff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <div class="top-brand">
        <span class="top-name">Curaah Recover</span>
        <span class="top-tagline">Recovery Intelligence</span>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="top-btn" id="btnNotifications" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none"></span>
      </button>
      <button class="top-btn avatar-btn" id="btnAvatar" aria-label="Profile">
        <div class="avatar-circle" id="avatarCircle">?</div>
      </button>
    </div>
  </header>

  <!-- ── MAIN CONTENT AREA ── -->
  <main class="main-content" id="mainContent">

    <!-- Auth / Onboarding Screen (shown first if not logged in) -->
    <div class="screen" id="screenAuth" data-screen="auth">
      <div class="screen-scroll" id="authContainer">
        <!-- Auth content injected by auth.js -->
      </div>
    </div>

    <!-- Onboarding Screen -->
    <div class="screen" id="screenOnboarding" data-screen="onboarding">
      <div class="screen-scroll" id="onboardingContainer">
        <!-- Onboarding steps injected by onboarding.js -->
      </div>
    </div>

    <!-- Home / Dashboard -->
    <div class="screen" id="screenHome" data-screen="home">
      <div class="screen-scroll" id="homeContainer">
        <!-- Dashboard injected by home.js -->
      </div>
    </div>

    <!-- Today's Schedule -->
    <div class="screen" id="screenToday" data-screen="today">
      <div class="screen-scroll" id="todayContainer">
        <!-- Today's doses injected by today.js -->
      </div>
    </div>

    <!-- Recovery Journey -->
    <div class="screen" id="screenJourney" data-screen="journey">
      <div class="screen-scroll" id="journeyContainer">
        <!-- Vitals, labs, trends injected by journey.js -->
      </div>
    </div>

    <!-- AI Companion -->
    <div class="screen" id="screenAI" data-screen="ai">
      <div class="screen-scroll screen-scroll--chat" id="aiContainer">
        <!-- AI chat injected by companion-ai.js -->
      </div>
    </div>

    <!-- Profile & Settings -->
    <div class="screen" id="screenProfile" data-screen="profile">
      <div class="screen-scroll" id="profileContainer">
        <!-- Profile injected by profile.js -->
      </div>
    </div>

  </main>

  <!-- ── SIDEBAR NAVIGATION (Desktop) ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="sidebar-logo" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="#3d9eff" stroke-width="2" opacity=".6"/><path d="M18 10v16M10 18h16" stroke="#3d9eff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <div>
        <div class="sidebar-name">Curaah Recover</div>
        <div class="sidebar-tag">Recovery Intelligence Engine</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-item active" data-tab="home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="sidebar-item" data-tab="today">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Today</span>
      </button>
      <button class="sidebar-item" data-tab="journey">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        <span>Journey</span>
      </button>
      <button class="sidebar-item" data-tab="ai">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
        <span>AI Companion</span>
      </button>
      <button class="sidebar-item" data-tab="profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-version">Curaah Recover v2.0</div>
      <div class="sidebar-version">IIT Ropar TBIF Incubated</div>
    </div>
  </nav>

  <!-- ── BOTTOM NAVIGATION (Mobile) ── -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bnav-item active" data-tab="home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Home</span>
    </button>
    <button class="bnav-item" data-tab="today">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Today</span>
    </button>
    <button class="bnav-item" data-tab="journey">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <span>Journey</span>
    </button>
    <button class="bnav-item" data-tab="ai">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
      <span>AI</span>
    </button>
    <button class="bnav-item" data-tab="profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

</div>

<!-- ── MODAL CONTAINER ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <!-- Modal content injected dynamically -->
  </div>
</div>

<!-- ── TOAST CONTAINER ── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── SOS FLOATING BUTTON ── -->
<button class="sos-float" id="sosFloat" aria-label="Emergency SOS" style="display:none">
  <span class="sos-pulse"></span>
  🚨
</button>

<!-- ═══════════ SCRIPTS ═══════════ -->
<script type="module" src="js/recover/app.js"></script>

</body>
</html>
